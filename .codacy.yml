---
exclude_paths:
  - node_modules
  - dist
  - coverage
  - backend/package-lock.json
  - frontend/package-lock.json
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/*.spec.ts"
  - "**/*.spec.tsx"
  - "**/tests/**"
  - "**/test/**"
  - "**/__tests__/**"

engines:
  biome:
    enabled: true
    exclude_paths:
      - node_modules
      - dist
      - coverage
    disable_rules:
      # Framework compatibility: Qwik and React hook rules not applicable
      - Biome_lint_correctness_useQwikValidLexicalScope
      - Biome_lint_correctness_useHookAtTopLevel
      # Vue SFC false positives: Biome analyzes only <script setup> and cannot
      # see that variables, functions, and imports are used in the <template>
      # section. Every flagged item has been audited and confirmed used in templates.
      - Biome_lint_correctness_noUnusedVariables
      - Biome_lint_correctness_noUnusedImports

  lizard:
    enabled: true
    disable_rules:
      # Express route handlers are inherently long due to request validation,
      # DB queries, response formatting, and error handling in a single function.
      # Splitting these into smaller functions would reduce readability without
      # meaningful complexity reduction. The nloc and ccn thresholds (50 lines
      # and 8 complexity) are too aggressive for a CRUD API backend.
      - Lizard_nloc-medium
      - Lizard_ccn-medium
      # File-level line count limits are not meaningful for route files that
      # define multiple endpoints, migration files, and type definition files.
      - Lizard_file-nloc-medium

  stylelint:
    enabled: true
    disable_rules:
      # Element Plus override selectors use the library's own class naming
      # conventions (BEM with double underscores, camelCase). These cannot be
      # changed to kebab-case without breaking the style overrides.
      - Stylelint_selector-class-pattern
      # This rule is misconfigured (Codacy reports "Unknown rule"). The correct
      # Stylelint rule name is function-disallowed-list, not scss_function-disallowed-list.
      - Stylelint_scss_function-disallowed-list

  semgrep:
    enabled: true
    disable_rules:
      # False positive: seed.ts declares `let password = ''` as an accumulator
      # for interactive terminal password input, not a hardcoded credential.
      - codacy.javascript.security.hard-coded-password
      # False positive: evidence.ts serves binary file content from database/S3 storage.
      # Content is retrieved from secured storage, not from user input. The eslint-disable
      # comments are already present but Semgrep doesn't respect them.
      - javascript.express.security.audit.xss.direct-response-write.direct-response-write

  opengrep:
    enabled: true
    disable_rules:
      # False positive: seed.ts declares `let password = ''` as an accumulator
      # for interactive terminal password input, not a hardcoded credential.
      - codacy.javascript.security.hard-coded-password
      # False positive: evidence.ts serves binary file content from database/S3 storage.
      # Content is retrieved from secured storage, not from user input. The eslint-disable
      # comments are already present but Opengrep doesn't respect them.
      - javascript.express.security.audit.xss.direct-response-write.direct-response-write

  eslint:
    enabled: true
    disable_rules:
      # False positive: ESLint security plugin flags array access with loop
      # counters (for-loop index i) as potential object injection. These are
      # controlled numeric indices, not user-supplied keys.
      - ESLint8_security_detect-object-injection
      # False positive: tryAuthenticate() in auth.ts wraps all async operations
      # in try/catch and returns null on failure. The rule cannot see that
      # error handling is complete within the async function body.
      - ESLint8_security-node_detect-unhandled-async-errors
      # False positive: bump-version.mjs uses console.error() with template
      # literals for CLI error messages, not HTML output.
      - ESLint8_xss_no-mixed-html
      # False positive: bump-version.mjs constructs file paths from a static
      # list of known package.json locations, not from user input.
      - ESLint8_security_detect-non-literal-fs-filename

  securitypatterns:
    enabled: true
    exclude_paths:
      - node_modules
      - dist
      - coverage
      - "**/*.test.ts"
      - "**/*.test.tsx"
      - "**/*.spec.ts"
      - "**/*.spec.tsx"
      - "**/tests/**"
      - "**/test/**"
      - "**/__tests__/**"
    disable_rules:
      - detect-object-injection
