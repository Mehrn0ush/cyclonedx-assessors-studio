---
exclude_paths:
  - node_modules
  - dist
  - coverage
  - backend/package-lock.json
  - frontend/package-lock.json
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/*.spec.ts"
  - "**/*.spec.tsx"
  - "**/tests/**"
  - "**/test/**"
  - "**/__tests__/**"

engines:
  biome:
    enabled: true
    exclude_paths:
      - node_modules
      - dist
      - coverage
    disable_rules:
      # Framework compatibility: Qwik and React hook rules not applicable
      - Biome_lint_correctness_useQwikValidLexicalScope
      - Biome_lint_correctness_useHookAtTopLevel
      # Vue SFC false positives: Biome analyzes only <script setup> and cannot
      # see that variables, functions, and imports are used in the <template>
      # section. Every flagged item has been audited and confirmed used in templates.
      - Biome_lint_correctness_noUnusedVariables
      - Biome_lint_correctness_noUnusedImports

  securitypatterns:
    enabled: true
    exclude_paths:
      - node_modules
      - dist
      - coverage
      - "**/*.test.ts"
      - "**/*.test.tsx"
      - "**/*.spec.ts"
      - "**/*.spec.tsx"
      - "**/tests/**"
      - "**/test/**"
      - "**/__tests__/**"
    disable_rules:
      - detect-object-injection
