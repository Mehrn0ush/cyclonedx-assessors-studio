###############################################################################
# CycloneDX Assessors Studio
# Quick-start / evaluation compose file using PGlite (embedded database)
#
# This file is standalone. Download it anywhere, set JWT_SECRET, and run:
#   JWT_SECRET=$(openssl rand -hex 32) docker compose up -d
#
# The app will be available at http://localhost:3001. On first visit the
# browser is redirected to /setup to create the administrator account.
#
# Required environment variables:
#   JWT_SECRET          - At least 32 characters, cryptographically random
#
# Optional overrides:
#   APP_IMAGE           - Container image (default: cyclonedx/cyclonedx-assessors-studio:latest)
#   PORT                - Host port mapping (default: 3001)
#
# To build from source instead of pulling the published image, run from the
# repository root:
#   docker build -f deploy/docker/Dockerfile -t cyclonedx/cyclonedx-assessors-studio:dev .
#   APP_IMAGE=cyclonedx/cyclonedx-assessors-studio:dev docker compose up -d
###############################################################################

services:
  app:
    image: ${APP_IMAGE:-cyclonedx/cyclonedx-assessors-studio:snapshot}
    pull_policy: always
    ports:
      - "${PORT:-3001}:3001"
    environment:
      # Core
      NODE_ENV: production
      PORT: 3001
      DATABASE_PROVIDER: pglite
      PGLITE_DATA_DIR: /app/data/pglite
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set (>= 32 chars, cryptographically random)}
      JWT_EXPIRY: ${JWT_EXPIRY:-24h}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      LOG_LEVEL: ${LOG_LEVEL:-info}

      # The initial administrator account is created via the in-browser
      # setup wizard at /setup on first visit. No admin credentials are
      # configured here.

      # Evidence storage
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-database}
      UPLOAD_MAX_FILE_SIZE: ${UPLOAD_MAX_FILE_SIZE:-52428800}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}

      # Event system
      APP_URL: ${APP_URL:-http://localhost:3001}

      # Webhook channel
      WEBHOOK_ENABLED: ${WEBHOOK_ENABLED:-true}
      WEBHOOK_TIMEOUT: ${WEBHOOK_TIMEOUT:-10000}
      WEBHOOK_MAX_RETRIES: ${WEBHOOK_MAX_RETRIES:-5}
      WEBHOOK_DELIVERY_RETENTION_DAYS: ${WEBHOOK_DELIVERY_RETENTION_DAYS:-30}

      # Email channel (SMTP)
      SMTP_ENABLED: ${SMTP_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_TLS_REJECT_UNAUTHORIZED: ${SMTP_TLS_REJECT_UNAUTHORIZED:-true}

      # Chat channels
      SLACK_ENABLED: ${SLACK_ENABLED:-false}
      TEAMS_ENABLED: ${TEAMS_ENABLED:-false}
      MATTERMOST_ENABLED: ${MATTERMOST_ENABLED:-false}
      CHAT_TIMEOUT: ${CHAT_TIMEOUT:-10000}
      CHAT_DELIVERY_RETENTION_DAYS: ${CHAT_DELIVERY_RETENTION_DAYS:-30}

      # Prometheus metrics
      METRICS_ENABLED: ${METRICS_ENABLED:-false}
      METRICS_TOKEN: ${METRICS_TOKEN:-}
      METRICS_PREFIX: ${METRICS_PREFIX:-cdxa_}
      METRICS_DOMAIN_REFRESH_INTERVAL: ${METRICS_DOMAIN_REFRESH_INTERVAL:-60}

      # Encryption at rest
      MASTER_ENCRYPTION_KEY: ${MASTER_ENCRYPTION_KEY:-}
      REQUIRE_ENCRYPTION: ${REQUIRE_ENCRYPTION:-false}
    volumes:
      - app-data:/app/data
    restart: unless-stopped

volumes:
  app-data:
