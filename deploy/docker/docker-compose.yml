###############################################################################
# CycloneDX Assessors Studio
# Development / Testing compose file using PGlite (embedded database)
#
# Usage:
#   cd deploy/docker && docker compose up --build
#
# The app will be available at http://localhost:3001
###############################################################################

services:
  app:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    ports:
      - "${PORT:-3001}:3001"
    environment:
      # Core
      NODE_ENV: production
      PORT: 3001
      DATABASE_PROVIDER: pglite
      PGLITE_DATA_DIR: /app/data/pglite
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-this-must-be-at-least-32-chars}
      JWT_EXPIRY: ${JWT_EXPIRY:-24h}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      LOG_LEVEL: ${LOG_LEVEL:-info}

      # Initial admin user (first-run seed only)
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@localhost}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-now}
      ADMIN_DISPLAY_NAME: ${ADMIN_DISPLAY_NAME:-Administrator}

      # Evidence storage
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-database}
      UPLOAD_MAX_FILE_SIZE: ${UPLOAD_MAX_FILE_SIZE:-52428800}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}

      # Event system
      APP_URL: ${APP_URL:-http://localhost:3001}

      # Webhook channel
      WEBHOOK_ENABLED: ${WEBHOOK_ENABLED:-true}
      WEBHOOK_TIMEOUT: ${WEBHOOK_TIMEOUT:-10000}
      WEBHOOK_MAX_RETRIES: ${WEBHOOK_MAX_RETRIES:-5}
      WEBHOOK_DELIVERY_RETENTION_DAYS: ${WEBHOOK_DELIVERY_RETENTION_DAYS:-30}

      # Email channel (SMTP)
      SMTP_ENABLED: ${SMTP_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_TLS_REJECT_UNAUTHORIZED: ${SMTP_TLS_REJECT_UNAUTHORIZED:-true}

      # Chat channels
      SLACK_ENABLED: ${SLACK_ENABLED:-false}
      TEAMS_ENABLED: ${TEAMS_ENABLED:-false}
      MATTERMOST_ENABLED: ${MATTERMOST_ENABLED:-false}
      CHAT_TIMEOUT: ${CHAT_TIMEOUT:-10000}
      CHAT_DELIVERY_RETENTION_DAYS: ${CHAT_DELIVERY_RETENTION_DAYS:-30}

      # Prometheus metrics
      METRICS_ENABLED: ${METRICS_ENABLED:-false}
      METRICS_TOKEN: ${METRICS_TOKEN:-}
      METRICS_PREFIX: ${METRICS_PREFIX:-cdxa_}
      METRICS_DOMAIN_REFRESH_INTERVAL: ${METRICS_DOMAIN_REFRESH_INTERVAL:-60}

      # Encryption at rest
      MASTER_ENCRYPTION_KEY: ${MASTER_ENCRYPTION_KEY:-}
      REQUIRE_ENCRYPTION: ${REQUIRE_ENCRYPTION:-false}
    volumes:
      - app-data:/app/data
    restart: unless-stopped

volumes:
  app-data:
