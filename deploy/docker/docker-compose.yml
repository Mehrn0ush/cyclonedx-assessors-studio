###############################################################################
# CycloneDX Assessors Studio
# Development / Testing compose file using PGlite (embedded database)
#
# Usage:
#   cd deploy/docker && docker compose up --build
#
# The app will be available at http://localhost:3001
###############################################################################

services:
  app:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    ports:
      - "${PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_PROVIDER: pglite
      PGLITE_DATA_DIR: /app/data/pglite
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-this-must-be-at-least-32-chars}
      JWT_EXPIRY: ${JWT_EXPIRY:-24h}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - app-data:/app/data
    restart: unless-stopped

volumes:
  app-data:
