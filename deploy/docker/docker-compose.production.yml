###############################################################################
# CycloneDX Assessors Studio - Production Deployment
# Uses PostgreSQL as the database backend.
#
# This file is standalone. Download it anywhere and run:
#   docker compose -f docker-compose.production.yml up -d
#
# Topology:
#   db     PostgreSQL 17, persisted via the pgdata volume.
#   app    Node.js server that serves both the Vue 3 SPA and the JSON API
#          on the same origin. Published on ${APP_PORT}.
#
# The initial administrator account is created via the in-browser setup
# wizard at /setup on first visit. No admin credentials are configured
# here.
#
# The backend generates a JWT signing secret on first run and persists
# it in the database. Set JWT_SECRET explicitly when running multiple
# replicas or managing the signing secret externally.
#
# Optional overrides:
#   APP_IMAGE           - Image to run. Pin to a version for production,
#                         e.g. cyclonedx/cyclonedx-assessors-studio:1.0.0
#   APP_PORT            - Host port to publish (default: 3001)
#   POSTGRES_PASSWORD   - Database password (default: assessors_studio)
#   CORS_ORIGIN         - Allowed CORS origin (default: same as app URL)
#   JWT_SECRET          - Override the auto-generated signing secret
#                         (>= 32 chars, cryptographically random)
#
# TLS: For production TLS, place a reverse proxy (nginx, traefik, caddy)
# in front of this stack, or terminate TLS at an ingress load balancer.
###############################################################################

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: assessors_studio
      POSTGRES_USER: assessors_studio
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-assessors_studio}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assessors_studio"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # Uncomment to expose PostgreSQL for external tooling:
    # ports:
    #   - "5432:5432"

  app:
    image: ${APP_IMAGE:-cyclonedx/cyclonedx-assessors-studio:snapshot}
    pull_policy: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3001}:3001"
    environment:
      # Core
      NODE_ENV: production
      PORT: 3001
      DATABASE_PROVIDER: postgres
      DATABASE_URL: postgresql://assessors_studio:${POSTGRES_PASSWORD:-assessors_studio}@db:5432/assessors_studio
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_EXPIRY: ${JWT_EXPIRY:-24h}
      # The browser and the API share an origin, so CORS is effectively
      # a no-op for the packaged deployment. Kept for compatibility with
      # direct API callers.
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:${APP_PORT:-3001}}
      LOG_LEVEL: ${LOG_LEVEL:-info}

      # The initial administrator account is created via the in-browser
      # setup wizard at /setup on first visit. No admin credentials are
      # configured here.

      # Evidence storage
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-database}
      UPLOAD_MAX_FILE_SIZE: ${UPLOAD_MAX_FILE_SIZE:-52428800}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}

      # Event system
      APP_URL: ${APP_URL:-http://localhost:${APP_PORT:-3001}}

      # Webhook channel
      WEBHOOK_ENABLED: ${WEBHOOK_ENABLED:-true}
      WEBHOOK_TIMEOUT: ${WEBHOOK_TIMEOUT:-10000}
      WEBHOOK_MAX_RETRIES: ${WEBHOOK_MAX_RETRIES:-5}
      WEBHOOK_DELIVERY_RETENTION_DAYS: ${WEBHOOK_DELIVERY_RETENTION_DAYS:-30}

      # Email channel (SMTP)
      SMTP_ENABLED: ${SMTP_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_TLS_REJECT_UNAUTHORIZED: ${SMTP_TLS_REJECT_UNAUTHORIZED:-true}

      # Chat channels
      SLACK_ENABLED: ${SLACK_ENABLED:-false}
      TEAMS_ENABLED: ${TEAMS_ENABLED:-false}
      MATTERMOST_ENABLED: ${MATTERMOST_ENABLED:-false}
      CHAT_TIMEOUT: ${CHAT_TIMEOUT:-10000}
      CHAT_DELIVERY_RETENTION_DAYS: ${CHAT_DELIVERY_RETENTION_DAYS:-30}

      # Prometheus metrics
      METRICS_ENABLED: ${METRICS_ENABLED:-false}
      METRICS_TOKEN: ${METRICS_TOKEN:-}
      METRICS_PREFIX: ${METRICS_PREFIX:-cdxa_}
      METRICS_DOMAIN_REFRESH_INTERVAL: ${METRICS_DOMAIN_REFRESH_INTERVAL:-60}

      # Encryption at rest
      MASTER_ENCRYPTION_KEY: ${MASTER_ENCRYPTION_KEY:-}
      REQUIRE_ENCRYPTION: ${REQUIRE_ENCRYPTION:-false}
    restart: unless-stopped

volumes:
  pgdata:
