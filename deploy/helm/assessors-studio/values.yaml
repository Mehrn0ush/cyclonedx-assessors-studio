# Default values for CycloneDX Assessors Studio
# Environment variables mapped 1:1 from CONFIGURATION.md in the repository root.

replicaCount: 1

image:
  repository: docker.io/cyclonedx/cyclonedx-assessors-studio
  pullPolicy: IfNotPresent
  tag: ""  # Defaults to Chart.appVersion

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 3001

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: assessors-studio.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: assessors-studio-tls
  #    hosts:
  #      - assessors-studio.example.com

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

#######################################
# Core (CONFIGURATION.md § Core)
#######################################
config:
  nodeEnv: production           # NODE_ENV
  logLevel: info                # LOG_LEVEL
  corsOrigin: "*"               # CORS_ORIGIN
  jwtExpiry: "24h"              # JWT_EXPIRY
  # Public base URL of the app. Required for any external notification channel.
  appUrl: ""                    # APP_URL
  # PGlite data directory (only used when database.provider=pglite).
  pgliteDataDir: /app/data/pglite  # PGLITE_DATA_DIR

#######################################
# Database (CONFIGURATION.md § Core)
#######################################
database:
  # "postgres" for production, "pglite" for single-replica eval.
  provider: postgres            # DATABASE_PROVIDER
  # Used when provider=postgres.
  external:
    host: ""
    port: 5432
    database: assessors_studio
    username: assessors_studio
    existingSecret: ""
    existingSecretPasswordKey: "password"
  # Set to true to deploy a PostgreSQL instance via this chart.
  bundled:
    enabled: true
    image: postgres:17-alpine
    storage: 10Gi
    storageClass: ""

#######################################
# Initial admin user (CONFIGURATION.md § Initial Admin User)
# Seed-only; ignored after an admin account exists.
#######################################
admin:
  username: "admin"             # ADMIN_USERNAME
  email: "admin@localhost"      # ADMIN_EMAIL
  displayName: ""               # ADMIN_DISPLAY_NAME (defaults to username)
  # Provide via existingSecret for production. If left unset, the chart will
  # create a Kubernetes secret from admin.password below (not recommended).
  existingSecret: ""
  existingSecretPasswordKey: "admin-password"
  password: ""                  # ADMIN_PASSWORD (only used if existingSecret unset)

#######################################
# JWT signing secret
#######################################
secrets:
  # If empty, the chart creates a secret named "<release>-secrets" from
  # secrets.jwtSecret below (not recommended for production).
  jwtSecretName: ""
  jwtSecretKey: "jwt-secret"
  jwtSecret: ""                 # JWT_SECRET (must be >= 32 chars)

#######################################
# Evidence storage (CONFIGURATION.md § Evidence Storage)
#######################################
storage:
  provider: database            # STORAGE_PROVIDER: database | s3
  uploadMaxFileSize: 52428800   # UPLOAD_MAX_FILE_SIZE (bytes)
  s3:
    bucket: ""                  # S3_BUCKET
    region: us-east-1           # S3_REGION
    endpoint: ""                # S3_ENDPOINT
    forcePathStyle: false       # S3_FORCE_PATH_STYLE
    # Credentials (prefer existingSecret in production).
    existingSecret: ""
    existingSecretAccessKeyIdKey: "access-key-id"
    existingSecretSecretAccessKeyKey: "secret-access-key"
    accessKeyId: ""             # S3_ACCESS_KEY_ID
    secretAccessKey: ""         # S3_SECRET_ACCESS_KEY

#######################################
# Notification channels
#######################################
notifications:
  # CONFIGURATION.md § Webhook Channel
  webhook:
    enabled: true               # WEBHOOK_ENABLED
    timeout: 10000              # WEBHOOK_TIMEOUT
    maxRetries: 5               # WEBHOOK_MAX_RETRIES
    deliveryRetentionDays: 30   # WEBHOOK_DELIVERY_RETENTION_DAYS

  # CONFIGURATION.md § Email Channel (SMTP)
  smtp:
    enabled: false              # SMTP_ENABLED
    host: ""                    # SMTP_HOST
    port: 587                   # SMTP_PORT
    secure: false               # SMTP_SECURE
    user: ""                    # SMTP_USER
    from: ""                    # SMTP_FROM
    tlsRejectUnauthorized: true # SMTP_TLS_REJECT_UNAUTHORIZED
    existingSecret: ""
    existingSecretPasswordKey: "smtp-password"
    password: ""                # SMTP_PASS (only used if existingSecret unset)

  # CONFIGURATION.md § Chat Channels
  chat:
    slackEnabled: false         # SLACK_ENABLED
    teamsEnabled: false         # TEAMS_ENABLED
    mattermostEnabled: false    # MATTERMOST_ENABLED
    timeout: 10000              # CHAT_TIMEOUT
    deliveryRetentionDays: 30   # CHAT_DELIVERY_RETENTION_DAYS

#######################################
# Prometheus metrics (CONFIGURATION.md § Prometheus Metrics)
#######################################
metrics:
  enabled: false                # METRICS_ENABLED
  prefix: "cdxa_"               # METRICS_PREFIX
  domainRefreshInterval: 60     # METRICS_DOMAIN_REFRESH_INTERVAL
  existingSecret: ""
  existingSecretTokenKey: "metrics-token"
  token: ""                     # METRICS_TOKEN (empty = unauthenticated)

#######################################
# Encryption at rest (CONFIGURATION.md § Encryption at Rest)
#######################################
encryption:
  require: false                # REQUIRE_ENCRYPTION
  existingSecret: ""
  existingSecretMasterKeyKey: "master-encryption-key"
  masterKey: ""                 # MASTER_ENCRYPTION_KEY (64 hex chars)

#######################################
# Persistence for PGlite mode (not recommended for production)
#######################################
persistence:
  enabled: false
  storageClass: ""
  size: 5Gi

#######################################
# Pod/container security and probes
#######################################
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

livenessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

nodeSelector: {}
tolerations: []
affinity: {}
