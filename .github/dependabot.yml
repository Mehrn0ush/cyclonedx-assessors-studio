# =============================================================================
# Dependabot Configuration
# =============================================================================
# Strategy:
#   - Security updates: immediate (handled automatically by GitHub)
#   - Version updates: weekly cadence with a 14 day cooldown period, giving
#     packages time to stabilize before Dependabot proposes them.
#   - The cooldown ensures newly released versions are at least 14 days old
#     before a PR is opened. Security updates bypass this and fire immediately.
#
# GitHub Actions are also monitored and pinned to SHA in the workflows.
# =============================================================================

version: 2

updates:

  # --- Backend npm dependencies ---
  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
    cooldown:
      default-days: 14
    open-pull-requests-limit: 10
    reviewers:
      - CycloneDX/assessors-studio-maintainers
    labels:
      - dependencies
      - backend
    groups:
      # Group minor/patch updates together to reduce PR noise
      backend-minor-patch:
        update-types:
          - minor
          - patch
      # Keep major bumps as individual PRs for careful review
    versioning-strategy: increase
    # Ignore pre-release versions
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-prerelease"]

  # --- Frontend npm dependencies ---
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    cooldown:
      default-days: 14
    open-pull-requests-limit: 10
    reviewers:
      - CycloneDX/assessors-studio-maintainers
    labels:
      - dependencies
      - frontend
    groups:
      frontend-minor-patch:
        update-types:
          - minor
          - patch
    versioning-strategy: increase
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-prerelease"]

  # --- GitHub Actions ---
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 14
    open-pull-requests-limit: 5
    reviewers:
      - CycloneDX/assessors-studio-maintainers
    labels:
      - dependencies
      - ci
    groups:
      github-actions:
        patterns:
          - "*"
